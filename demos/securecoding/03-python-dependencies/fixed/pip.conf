# pip configuration — restricts package installation to a trusted internal mirror.
#
# In a production environment, copy this file to:
#   Linux/macOS : ~/.config/pip/pip.conf  (or $PIP_CONFIG_FILE)
#   Windows     : %APPDATA%\pip\pip.ini
#
# Or reference it explicitly:
#   pip install --config-file pip.conf -r requirements.txt
#
# FIX: Employees can only install packages approved and mirrored internally.
#      This prevents:
#        - Dependency confusion attacks (internal package names resolved from PyPI)
#        - Typosquatting (attacker packages with similar names on PyPI)
#        - Direct access to PyPI from build servers (reduces egress attack surface)

[global]
# FIX: Point to your internal mirror (Artifactory, Nexus, Devpi, etc.)
index-url = https://pypi.internal.example.esa.int/simple/

# FIX: trusted-host avoids TLS errors when using an internal CA.
#      Remove if your mirror uses a publicly trusted certificate.
trusted-host = pypi.internal.example.esa.int

# FIX: Disable fallback to PyPI — if a package is not in the internal mirror,
#      installation fails rather than silently fetching from the public registry.
# (pip >= 23.1 respects this; for older pip, use --no-index in CI commands)
# no-index = true   # uncomment to fully disable PyPI fallback
